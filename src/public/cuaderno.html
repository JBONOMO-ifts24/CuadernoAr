<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Cuaderno AR</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js con soporte para barcode (matrix) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
        }
        #detected-marker-container {
            pointer-events: auto;
        }
        #marker-detail-btn {
            pointer-events: auto;
        }
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: #6366f1;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <button id="back-btn" onclick="window.location.href='/listado-cuadernos.html'">Volver</button>

    <!-- Configure AR.js to use barcode markers -->
    <a-scene 
        embedded 
        arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'
        id="ar-scene">
        
        <a-entity camera></a-entity>
    </a-scene>
    
    <div id="ui-layer">
        <h2 id="notebook-name" style="margin: 0; font-size: 1.2rem;">Cargando...</h2>
        <p id="status-msg" style="margin: 5px 0 0 0; font-size: 0.9rem; opacity: 0.8;">Iniciando cámara...</p>
        <div id="detected-marker-container" style="margin: 10px 0 0 0; display: none;">
            <p id="detected-marker" style="margin: 0 0 8px 0; font-size: 1rem; color: #4ade80; font-weight: bold;"></p>
            <button id="marker-detail-btn" style="background: #4ade80; color: #000; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9rem;">Ver Detalles →</button>
        </div>
    </div>
</body>

    <script>
        const uiName = document.getElementById('notebook-name');
        const uiStatus = document.getElementById('status-msg');
        const detectedMarkerUI = document.getElementById('detected-marker');
        const detectedMarkerContainer = document.getElementById('detected-marker-container');
        const markerDetailBtn = document.getElementById('marker-detail-btn');
        const scene = document.getElementById('ar-scene');
        const token = localStorage.getItem('token');
        
        // Extract ID from URL (?id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const cuadernoId = urlParams.get('id');

        if (!token) {
            window.location.href = '/login.html';
        }

        if (!cuadernoId) {
            alert('No se especificó un cuaderno.');
            window.location.href = '/listado-cuadernos.html';
        }

        async function initAR() {
            try {
                uiStatus.textContent = 'Obteniendo marcadores...';
                
                // Fetch markers for this notebook
                const markersRes = await fetch(`/api/marcadores/cuaderno/${cuadernoId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!markersRes.ok) throw new Error('Error al cargar marcadores');
                const marcadores = await markersRes.json();
                
                if (marcadores.length === 0) {
                    uiStatus.textContent = 'Este cuaderno no tiene marcadores asociados.';
                    return;
                }

                uiName.textContent = `Cuaderno AR (${marcadores.length} marcadores)`;
                uiStatus.textContent = 'Cargando contenido...';

                // For each marker, create a red box
                for (const marcador of marcadores) {
                    // Create barcode marker element
                    const markerEl = document.createElement('a-marker');
                    markerEl.setAttribute('type', 'barcode');
                    markerEl.setAttribute('value', marcador.codigo_asociado);
                    
                    // Add red box
                    const boxEl = document.createElement('a-box');
                    boxEl.setAttribute('position', '0 0.5 0');
                    boxEl.setAttribute('color', '#ff0000');
                    boxEl.setAttribute('data-marcador-id', marcador.id);
                    markerEl.appendChild(boxEl);
                    
                    // Add event listeners for marker detection
                    markerEl.addEventListener('markerFound', () => {
                        detectedMarkerUI.textContent = `✓ Detectado el marcador: ${marcador.codigo_asociado}`;
                        detectedMarkerContainer.style.display = 'block';
                        markerDetailBtn.onclick = () => {
                            window.location.href = `/marcador-detalle.html?id=${marcador.id}&cuaderno=${cuadernoId}`;
                        };
                    });
                    
                    markerEl.addEventListener('markerLost', () => {
                        detectedMarkerContainer.style.display = 'none';
                    });
                    
                    scene.insertBefore(markerEl, document.querySelector('[camera]'));
                }
                
                uiStatus.textContent = 'Busca los marcadores con tu cámara.';

            } catch (err) {
                console.error(err);
                uiStatus.textContent = 'Error: ' + err.message;
            }
        }



        // Start initialization
        initAR();
        
        // Handle clicks on canvas for A-Frame objects
        document.addEventListener('click', (event) => {
            const scene = document.getElementById('ar-scene');
            const camera = scene.querySelector('[camera]');
            
            if (!camera) return;
            
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            
            // Get mouse position relative to canvas
            const canvas = scene.canvas || scene.renderer.domElement;
            const rect = canvas.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            // Set raycaster from camera
            raycaster.setFromCamera(mouse, camera.getObject3D('camera'));
            
            // Check all objects in scene
            const objectsToTest = [];
            scene.object3D.traverse((obj) => {
                if (obj.userData && obj.userData['markerjs-marker-element']) return;
                objectsToTest.push(obj);
            });
            
            const intersects = raycaster.intersectObjects(objectsToTest, true);
            
            if (intersects.length > 0) {
                // Find the first object that has a data attribute for marcador-id
                for (let intersection of intersects) {
                    let obj = intersection.object;
                    while (obj) {
                        const el = obj.el;
                        if (el && el.hasAttribute('data-marcador-id')) {
                            const marcadorId = el.getAttribute('data-marcador-id');
                            window.location.href = `/marcador-detalle.html?id=${marcadorId}&cuaderno=${cuadernoId}`;
                            return;
                        }
                        obj = obj.parent;
                    }
                }
            }
        });
    </script>
</body>
</html>
